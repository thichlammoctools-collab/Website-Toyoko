backend:
  name: github
  repo: thichlammoctools-collab/Website-Toyoko
  branch: main
  base_url: https://quangphugroup.com
  auth_endpoint: api/auth

local_backend: false

media_folder: images/uploads
public_folder: /images/uploads

collections:
  - name: products
    label: "Sản phẩm"
    folder: _data/products
    create: true
    slug: "{{slug}}"
    format: json
    identifier_field: name
    fields:
      - {name: name, label: "Tên sản phẩm", widget: string}
      - {name: slug, label: "Slug (URL)", widget: string}
      - name: category
        label: "Danh mục"
        widget: select
        options: ["Máy khoan", "Máy mài", "Máy cưa", "Khác"]
      - {name: price, label: "Giá (VNĐ, 0=Liên hệ)", widget: number, value_type: int, default: 0}
      - {name: unit, label: "Đơn vị", widget: string, default: "cái"}
      - {name: description, label: "Mô tả", widget: markdown}
      - name: images
        label: "Ảnh sản phẩm"
        widget: list
        field: {name: src, label: "Ảnh", widget: image}
      - {name: visible, label: "Hiển thị", widget: boolean, default: true}

  - name: posts
    label: "Bài viết / Tuyển dụng"
    folder: _data/posts
    create: true
    slug: "{{slug}}"
    format: json
    identifier_field: title
    fields:
      - {name: title, label: "Tiêu đề", widget: string}
      - {name: slug, label: "Slug (URL)", widget: string}
      - {name: date, label: "Ngày đăng", widget: datetime, format: "YYYY-MM-DD"}
      - {name: excerpt, label: "Tóm tắt", widget: text}
      - {name: content, label: "Nội dung", widget: markdown}
      - {name: visible, label: "Hiển thị", widget: boolean, default: true}
