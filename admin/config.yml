backend:
  name: github
  repo: thichlammoctools-collab/Website-Toyoko
  branch: main
  base_url: https://quangphugroup.com
  auth_endpoint: api/auth

local_backend: false

media_folder: images/uploads
public_folder: /images/uploads

collections:
  - name: products
    label: "📦 Sản phẩm"
    folder: "_data/products"
    create: true
    format: json
    slug: "{{slug}}"
    identifier_field: name
    summary: "{{name}} - {{price}} VNĐ"
    fields:
      - {name: id, label: "ID", widget: string}
      - {name: name, label: "Tên sản phẩm", widget: string}
      - {name: sku, label: "Mã hàng (SKU)", widget: string}
      - {name: slug, label: "Slug URL", widget: string}
      - name: category
        label: "Danh mục"
        widget: select
        options: ["Máy khoan", "Máy mài", "Máy cưa", "Máy siết bulon/vít", "Khác"]
      - {name: price, label: "Giá (VNĐ, 0=Liên hệ)", widget: number, value_type: int, default: 0}
      - {name: unit, label: "Đơn vị", widget: string, default: "bộ"}
      - {name: description, label: "Mô tả", widget: text}
      - name: images
        label: "Ảnh sản phẩm"
        widget: list
        field: {name: src, label: "URL ảnh", widget: string}
      - {name: visible, label: "Hiển thị", widget: boolean, default: true}

  - name: posts
    label: "📝 Bài viết"
    folder: "_data/posts"
    create: true
    format: json
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{title}}"
    fields:
      - {name: id, label: "ID", widget: string}
      - {name: title, label: "Tiêu đề", widget: string}
      - {name: slug, label: "Slug URL", widget: string}
      - {name: date, label: "Ngày đăng", widget: string}
      - {name: excerpt, label: "Tóm tắt", widget: text}
      - {name: content, label: "Nội dung", widget: markdown}
      - {name: visible, label: "Hiển thị", widget: boolean, default: true}
