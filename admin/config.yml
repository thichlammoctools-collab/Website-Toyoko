backend:
  name: github
  repo: thichlammoctools-collab/Website-Toyoko
  branch: main
  base_url: https://quangphugroup.com
  auth_endpoint: api/auth

# Uploaded media go to /images/uploads
media_folder: images/uploads
public_folder: /images/uploads

collections:
  # ─── PRODUCTS ────────────────────────────────────────────────────
  - name: "products"
    label: "Sản phẩm"
    folder: "_data/products"
    create: true
    slug: "{{slug}}"
    format: "json"
    identifier_field: "name"
    summary: "{{name}} – {{category}}"
    fields:
      - { name: "name", label: "Tên sản phẩm", widget: "string" }
      - { name: "slug", label: "Slug (URL)", widget: "string",
          hint: "Ví dụ: may-khoan-pin-toyoko-cd01" }
      - name: "category"
        label: "Danh mục"
        widget: "select"
        options: ["Máy khoan", "Máy mài", "Máy cưa", "Khác"]
      - { name: "price", label: "Giá (VNĐ, 0 = Liên hệ)", widget: "number", value_type: "int", default: 0 }
      - { name: "unit", label: "Đơn vị tính", widget: "string", default: "cái" }
      - { name: "description", label: "Mô tả sản phẩm", widget: "markdown" }
      - name: "images"
        label: "Ảnh sản phẩm"
        widget: "list"
        field: { name: "src", label: "Ảnh", widget: "image" }
      - name: "specs"
        label: "Thông số kỹ thuật"
        widget: "list"
        summary: "{{fields.key}}: {{fields.value}}"
        fields:
          - { name: "key", label: "Tên thông số", widget: "string" }
          - { name: "value", label: "Giá trị", widget: "string" }
      - { name: "visible", label: "Hiển thị trên website", widget: "boolean", default: true }

  # ─── POSTS ───────────────────────────────────────────────────────
  - name: "posts"
    label: "Bài viết / Tuyển dụng"
    folder: "_data/posts"
    create: true
    slug: "{{slug}}"
    format: "json"
    identifier_field: "title"
    summary: "{{title}} ({{date}})"
    fields:
      - { name: "title", label: "Tiêu đề", widget: "string" }
      - { name: "slug", label: "Slug (URL)", widget: "string" }
      - { name: "date", label: "Ngày đăng", widget: "datetime", format: "YYYY-MM-DD" }
      - { name: "excerpt", label: "Tóm tắt ngắn", widget: "text" }
      - { name: "content", label: "Nội dung chi tiết", widget: "markdown" }
      - { name: "visible", label: "Hiển thị trên website", widget: "boolean", default: true }
